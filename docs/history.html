<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decisio - History</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>
<body>
  
  <main class="dashboard-container">
    <header class="app-header">
      <div class="logo">
        DECISIO
      </div>
      <div class="header-nav">
        <a href="index.html" class="btn btn-outline" style="text-decoration: none; margin-right: 15px;">Back to App</a>
        <button id="logoutBtn" class="btn hidden">Logout</button>
      </div>
    </header>

    <div class="content-grid" style="grid-template-columns: 1fr; max-width: 800px; margin: 0 auto;">
      <section class="panel stats-panel" style="width: 100%;">
        <h2 class="panel-title">Your Decision History</h2>
        
        <div class="stats-cards">
          <div class="stat-card">
             <div class="stat-value" id="totalSpinsStat">0</div>
             <div class="stat-label">Decisions Made</div>
          </div>
          <div class="stat-card">
             <div class="stat-value text-emerald" id="successRateStat">0%</div>
             <div class="stat-label">Satisfaction Rate</div>
          </div>
        </div>

        <h3 class="subsection-title">Recent Activity</h3>
        <ul id="statsList" class="activity-list">
          <!-- JS will populate stats here -->
        </ul>
      </section>
    </div>
  </main>

  <script src="history.js"></script>
</body>
</html>
