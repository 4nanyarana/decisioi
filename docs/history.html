<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decisio - History</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>
<body>
  
  <main class="dashboard-container">
    <header class="app-header">
      <div class="logo">
        DECISIO
      </div>
      <nav class="main-nav">
        <a href="app.html" class="nav-link">Home</a>
        <a href="history.html" class="nav-link active">History</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
      <div class="header-nav">
        <button id="logoutBtn" class="btn hidden">Logout</button>
      </div>
    </header>

    <div class="content-grid" style="grid-template-columns: 1fr; max-width: 800px; margin: 0 auto;">
      <section class="panel stats-panel" style="width: 100%;">
        <h2 class="panel-title">Your Decision History</h2>
        
        <div class="stats-cards">
          <div class="stat-card">
             <div class="stat-value" id="totalSpinsStat">0</div>
             <div class="stat-label">Decisions Made</div>
          </div>
          <div class="stat-card">
             <div class="stat-value text-emerald" id="successRateStat">0%</div>
             <div class="stat-label">Satisfaction Rate</div>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--panel-border); padding-bottom: 0.5rem;">
          <h3 class="subsection-title" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">Recent Activity</h3>
          <button class="btn btn-outline" style="padding: 5px 10px; font-size: 0.8rem; width: auto; color: var(--danger-color); border-color: rgba(239, 68, 68, 0.3);" onclick="clearHistory()">Clear History</button>
        </div>
        <ul id="statsList" class="activity-list">
          <!-- JS will populate stats here -->
        </ul>
      </section>
    </div>
  </main>

  <script src="history.js"></script>
</body>
</html>
