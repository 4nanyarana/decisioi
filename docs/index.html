<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decisio - Just Spin It</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>
<body>
  
  <main class="dashboard-container">
    <header class="app-header">
      <div class="logo">
        DECISIO
      </div>
      <div class="header-nav">
        <!-- Dashboard info -->
        <span class="greeting">Hello, <strong id="greetingUser">Decisive One</strong></span>
        <button id="logoutBtn" class="btn hidden">Logout</button>
      </div>
    </header>

    <div class="content-grid">
      <!-- Options Sidebar -->
      <section class="panel options-panel">
        <h2 class="panel-title">Decision Options</h2>
        
        <div id="optionsList" class="options-list">
          <!-- JS will populate options here -->
        </div>
        
        <button id="addOptionBtn" class="btn btn-outline">+ Add Option</button>
      </section>

      <!-- Center Wheel Area -->
      <section class="wheel-section">
        <h1 class="main-title">Stop overthinking. <br/><span class="highlight">Just decide.</span></h1>
        
        <div class="shuffle-container">
          <div id="shuffleBox" class="shuffle-box">
            <span id="shuffleText">Ready?</span>
          </div>
          <button id="spinBtn" class="spin-center-btn">SHUFFLE</button>
        </div>

        <div id="resultModal" class="result-modal hidden">
          <div class="result-content">
            <h3>You got: <strong id="resultText"></strong>!</h3>
            <div id="regretPrompt" class="regret-prompt hidden">
              <button class="btn" onclick="app.handleRegret('satisfied')">Loved it!</button>
              <button class="btn" onclick="app.handleRegret('regret')">Regret it!</button>
            </div>
            <p id="regretStatusMessage" class="hidden status-message"></p>
            <button class="btn btn-outline" style="margin-top: 15px;" onclick="app.closeResult()">Spin Again</button>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Auth Modal -->
  <div id="authModal" class="result-modal hidden">
    <div class="result-content">
      <h2 class="main-title" id="authTitle">Welcome Back</h2>
      
      <form id="authForm" style="display: flex; flex-direction: column; gap: 10px; text-align: left;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <label style="width: 80px; text-align: right; margin-right: 15px;">Email</label>
          <input type="email" id="authEmail" class="option-input" required style="flex: 1;" />
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <label style="width: 80px; text-align: right; margin-right: 15px;">Password</label>
          <input type="password" id="authPassword" class="option-input" required style="flex: 1;" />
        </div>
        <p id="authErrorMsg" class="status-message" style="color: red;"></p>
        
        <button type="submit" id="authSubmitBtn" class="btn">Log In</button>
      </form>
      
      <div style="margin-top: 15px;">
        <span id="authToggleText">Don't have an account?</span> 
        <button id="authToggleBtn" class="btn">Sign Up</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
