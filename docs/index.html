<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decisio - Just Spin It</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css" />
  <!-- Confetti script -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>
<body class="theme-default">
  
  <div class="background-effects">
    <div class="glow glow-purple"></div>
    <div class="glow glow-emerald"></div>
  </div>

  <main class="dashboard-container">
    <header class="app-header glass">
      <div class="logo">
        <div class="logo-icon"></div>
        DECISIO
      </div>
      <div class="header-nav">
        <!-- Dashboard info -->
        <span class="greeting">Hello, <strong id="greetingUser">Decisive One</strong> ✨</span>
        <button id="logoutBtn" class="btn btn-outline hidden" style="margin-left: 1rem; padding: 0.2rem 1rem;">Logout</button>
      </div>
    </header>

    <div class="content-grid">
      <!-- Options Sidebar -->
      <section class="panel options-panel glass">
        <h2 class="panel-title">Decision Options</h2>
        
        <div class="mood-selector">
          <label for="mood">Mode:</label>
          <div class="select-wrapper">
             <select id="moodSelect">
                <option value="default">Default</option>
                <option value="safe">Safe (Chill)</option>
                <option value="hangry">Hangry (Fast!)</option>
             </select>
          </div>
        </div>

        <div class="overthinking-container" title="Overthinking Meter">
          <div class="meter-text">Overthinking Meter</div>
          <div class="confidence-meter">
            <div id="confidenceFill" class="confidence-fill"></div>
          </div>
        </div>

        <div id="optionsList" class="options-list">
          <!-- JS will populate options here -->
        </div>
        
        <button id="addOptionBtn" class="btn btn-outline">+ Add Option</button>
      </section>

      <!-- Center Wheel Area -->
      <section class="wheel-section">
        <h1 class="main-title">Stop overthinking.<br/><span class="highlight">Just spin it.</span></h1>
        
        <div class="wheel-container">
          <div class="pointer"></div>
          <div id="wheel" class="wheel">
            <!-- Dynamic conic gradient background -->
          </div>
          <button id="spinBtn" class="spin-center-btn">SPIN</button>
        </div>

        <div id="resultModal" class="result-modal glass hidden">
          <div class="result-content">
            <h3>✨ You got: <strong id="resultText"></strong>!</h3>
            <div id="regretPrompt" class="regret-prompt hidden">
              <button class="btn btn-emerald" onclick="app.handleRegret('satisfied')">Loved it!</button>
              <button class="btn btn-danger" onclick="app.handleRegret('regret')">Regret it!</button>
            </div>
            <p id="regretStatusMessage" class="hidden status-message"></p>
            <button class="btn btn-outline" style="margin-top: 1.5rem; border-color: rgba(255,255,255,0.2);" onclick="app.closeResult()">Spin Again</button>
          </div>
        </div>
      </section>

      <!-- Stats Sidebar -->
      <section class="panel stats-panel glass">
        <h2 class="panel-title">Analytics</h2>
        
        <div class="stats-cards">
          <div class="stat-card">
             <div class="stat-value" id="totalSpinsStat">0</div>
             <div class="stat-label">Decisions Made</div>
          </div>
          <div class="stat-card">
             <div class="stat-value text-emerald" id="successRateStat">0%</div>
             <div class="stat-label">Satisfaction Rate</div>
          </div>
        </div>

        <h3 class="subsection-title">Recent Activity</h3>
        <ul id="statsList" class="activity-list">
          <!-- JS will populate stats here -->
        </ul>
      </section>

    </div>
  </main>

  <!-- Auth Modal -->
  <div id="authModal" class="result-modal glass hidden" style="z-index: 1000;">
    <div class="result-content" style="max-width: 400px; width: 90%;">
      <h2 class="main-title" style="font-size: 2rem; margin-bottom: 1.5rem;" id="authTitle">Welcome Back</h2>
      
      <form id="authForm" style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">
        <div>
          <label style="font-size: 0.9rem; color: #a1a1aa; margin-bottom: 0.3rem; display: block;">Email</label>
          <input type="email" id="authEmail" class="option-input" placeholder="you@example.com" required style="width: 100%; box-sizing: border-box;" />
        </div>
        <div>
          <label style="font-size: 0.9rem; color: #a1a1aa; margin-bottom: 0.3rem; display: block;">Password</label>
          <input type="password" id="authPassword" class="option-input" placeholder="••••••••" required style="width: 100%; box-sizing: border-box;" />
        </div>
        <p id="authErrorMsg" class="status-message" style="color: var(--danger-color); font-size: 0.9rem; margin: 0;"></p>
        
        <button type="submit" id="authSubmitBtn" class="btn" style="background: var(--primary-color); border: none; margin-top: 1rem;">Log In</button>
      </form>
      
      <div style="margin-top: 1.5rem; font-size: 0.9rem; color: #a1a1aa;">
        <span id="authToggleText">Don't have an account?</span> 
        <button id="authToggleBtn" style="background: none; border: none; color: var(--secondary-glow); cursor: pointer; font-family: inherit; font-size: inherit; text-decoration: underline;">Sign Up</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
