<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decisio – Spin to Decide Smarter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <div class="greeting">Good evening, Decisive One ✨</div>
            <h1>
                Stop overthinking.<br>
                <span class="highlight">Just spin it.</span>
            </h1>
            <p class="subtitle">
                Put your options in, spin the wheel, and let it decide for you. Easy.
            </p>
        </header>

        <section class="app-layout">
            <div class="input-section glass-panel">
                <h2>Your Options</h2>
                <div class="input-group">
                    <input type="text" id="optionsInput" placeholder="Enter options, comma separated (e.g. Pizza, Burger, Sushi)" autocomplete="off">
                </div>
                <div class="controls">
                    <button class="btn primary" id="spinBtn">
                        <span class="icon">🎡</span> Spin It
                    </button>
                    <button class="btn secondary" id="statsBtn">
                        <span class="icon">📊</span> Stats
                    </button>
                </div>
                <div id="resultBox" class="result-box hidden"></div>
            </div>

            <div class="wheel-section">
                <div class="wheel-container">
                    <div class="pointer"></div>
                    <canvas id="wheelCanvas" width="400" height="400"></canvas>
                </div>
            </div>
        </section>

        <!-- Stats Modal / Slide-over -->
        <div id="statsBox" class="stats-box glass-panel hidden">
            <div class="stats-header">
                <h3>Recent Spins</h3>
                <button class="close-btn" id="closeStatsBtn">&times;</button>
            </div>
            <ul id="statsList" class="stats-list"></ul>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
